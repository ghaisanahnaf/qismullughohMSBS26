<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — MSBS</title>
<script>
// Kalau sudah login, langsung ke dashboard
(function(){
  var auth=sessionStorage.getItem('msbs_auth');
  if(auth){try{var d=JSON.parse(atob(auth));if(d.user&&d.ts&&(Date.now()-d.ts)<86400000){window.location.replace('dashboard.html');}}catch(e){sessionStorage.removeItem('msbs_auth');}}
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080f;--card:#0e0e1a;--border:rgba(255,255,255,.07);
    --gold:#C9A84C;--gold-light:#e0c06a;--gold-dim:rgba(201,168,76,.4);
    --gold-faint:rgba(201,168,76,.07);--text:#e8e6df;--muted:rgba(232,230,223,.45);
    --red:#e05c5c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  
  /* subtle background grid */
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

  .wrap{width:100%;max-width:360px;padding:1.5rem}
  
  .brand{text-align:center;margin-bottom:2.5rem}
  .brand-logo{font-size:1.8rem;font-weight:600;letter-spacing:.25em;color:var(--gold);font-family:'Outfit',sans-serif}
  .brand-sub{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:4px;line-height:1.6}

  .card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2rem}
  
  .card-title{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem}

  .field{margin-bottom:1rem}
  .field label{display:block;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
  .field input{
    width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
    border-radius:2px;padding:.65rem .85rem;color:var(--text);font-family:'Outfit',sans-serif;
    font-size:.85rem;outline:none;transition:border-color .2s;
  }
  .field input:focus{border-color:var(--gold-dim)}
  .field input.err{border-color:var(--red)}

  .err-msg{font-size:.7rem;color:var(--red);margin-top:.4rem;display:none}
  .err-msg.show{display:block}

  .btn{
    width:100%;margin-top:1.5rem;padding:.75rem;background:var(--gold-faint);
    border:1px solid var(--gold-dim);color:var(--gold-light);border-radius:2px;
    font-family:'Outfit',sans-serif;font-size:.75rem;letter-spacing:.15em;
    text-transform:uppercase;cursor:pointer;transition:all .2s;
  }
  .btn:hover{background:rgba(201,168,76,.15);border-color:var(--gold)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .attempt-msg{font-size:.65rem;color:var(--muted);text-align:center;margin-top:1rem;min-height:1rem}
  
  .lockout{display:none;text-align:center;padding:1rem;border:1px solid rgba(224,92,92,.3);border-radius:2px;background:rgba(224,92,92,.05);margin-top:1rem}
  .lockout.show{display:block}
  .lockout p{font-size:.72rem;color:var(--red)}
  .lockout .countdown{font-size:1.2rem;color:var(--red);font-family:'Cormorant Garamond',serif;margin-top:.3rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-logo">MSBS</div>
    <div class="brand-sub">Sistem Pelanggaran Bahasa<br>Qismullughoh</div>
  </div>

  <div class="card">
    <div class="card-title">Masuk ke Sistem</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="username" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <div class="err-msg" id="errMsg">Username atau password salah.</div>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Masuk</button>
    <div class="attempt-msg" id="attemptMsg"></div>

    <div class="lockout" id="lockoutBox">
      <p>Terlalu banyak percobaan gagal. Coba lagi dalam:</p>
      <div class="countdown" id="countdown"></div>
    </div>
  </div>
</div>

<script>
// ── Kredensial (hash SHA-256 di sisi client) ──────────────────────────────────
// Untuk keamanan lebih: ganti USERS dengan hash SHA-256 dari password
// sha256("password") → hash. Gunakan: https://emn178.github.io/online-tools/sha256.html
const USERS = {
  'admin':          'qismullughohmsbs',   // username: password
  'qismullughohmsbs': 'msbs2026',
};

// ── Lockout config ────────────────────────────────────────────────────────────
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 5 * 60 * 1000; // 5 menit

let attempts = parseInt(sessionStorage.getItem('msbs_attempts')||'0');
let lockedUntil = parseInt(sessionStorage.getItem('msbs_locked')||'0');
let countdownTimer = null;

function isLocked(){
  return lockedUntil > Date.now();
}

function updateAttemptMsg(){
  const el = document.getElementById('attemptMsg');
  const rem = MAX_ATTEMPTS - attempts;
  if(attempts > 0 && !isLocked()){
    el.textContent = rem + ' percobaan tersisa.';
  } else {
    el.textContent = '';
  }
}

function startLockoutUI(){
  document.getElementById('lockoutBox').classList.add('show');
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('attemptMsg').textContent = '';

  function tick(){
    const ms = lockedUntil - Date.now();
    if(ms <= 0){
      document.getElementById('lockoutBox').classList.remove('show');
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('countdown').textContent = '';
      attempts = 0;
      sessionStorage.removeItem('msbs_attempts');
      sessionStorage.removeItem('msbs_locked');
      updateAttemptMsg();
      return;
    }
    const m = Math.floor(ms/60000);
    const s = Math.floor((ms%60000)/1000);
    document.getElementById('countdown').textContent =
      String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    countdownTimer = setTimeout(tick, 500);
  }
  tick();
}

// Check lockout on load
if(isLocked()) startLockoutUI();
updateAttemptMsg();

// Enter key support
document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && !document.getElementById('loginBtn').disabled) doLogin();
});

function doLogin(){
  if(isLocked()) return;

  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const errEl = document.getElementById('errMsg');

  errEl.classList.remove('show');
  document.getElementById('username').classList.remove('err');
  document.getElementById('password').classList.remove('err');

  if(!user || !pass){
    errEl.textContent = 'Isi username dan password.';
    errEl.classList.add('show');
    return;
  }

  // Check credentials
  if(USERS[user] && USERS[user] === pass){
    // Success — buat token
    attempts = 0;
    sessionStorage.removeItem('msbs_attempts');
    sessionStorage.removeItem('msbs_locked');

    const token = btoa(JSON.stringify({user: user, ts: Date.now()}));
    sessionStorage.setItem('msbs_auth', token);
    window.location.replace('dashboard.html');
  } else {
    // Failed
    attempts++;
    sessionStorage.setItem('msbs_attempts', attempts);

    if(attempts >= MAX_ATTEMPTS){
      lockedUntil = Date.now() + LOCKOUT_MS;
      sessionStorage.setItem('msbs_locked', lockedUntil);
      startLockoutUI();
    } else {
      errEl.textContent = 'Username atau password salah.';
      errEl.classList.add('show');
      document.getElementById('username').classList.add('err');
      document.getElementById('password').classList.add('err');
      updateAttemptMsg();
    }
  }
}
</script>
</body>
</html>
