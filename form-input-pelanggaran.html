<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Input Pelanggaran — MSBS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8B6E2E;--gold-faint:rgba(201,168,76,0.07);
  --deep:#08080F;--panel:#13131E;--card:#181825;--card2:#1C1C2B;
  --border:rgba(201,168,76,0.13);--border-md:rgba(201,168,76,0.28);
  --text:#F0EAD6;--muted:rgba(240,234,214,0.45);--dim:rgba(240,234,214,0.2);
  --red:#E07070;--red-bg:rgba(224,112,112,0.1);
  --amber:#E8A84C;--amber-bg:rgba(232,168,76,0.1);
  --green:#5EC98A;--green-bg:rgba(94,201,138,0.1);
  --sidebar:224px;
}
html,body{height:100%;background:var(--deep);font-family:'Outfit',sans-serif;color:var(--text)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:99px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:20;transition:transform .3s}
.sb-logo{padding:1.5rem 1.4rem 1.1rem;border-bottom:1px solid var(--border)}
.logo-mark{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:300;color:var(--gold);letter-spacing:.06em;line-height:1}
.logo-sub{font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.nav{flex:1;padding:.8rem 0}
.nav-sec{font-size:.57rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);padding:.7rem 1.4rem .3rem}
.nav-item{display:flex;align-items:center;gap:9px;padding:.6rem 1.4rem;font-size:.8rem;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:all .2s}
.nav-item:hover{color:var(--text);background:var(--gold-faint)}
.nav-item.active{color:var(--gold-light);border-left-color:var(--gold);background:var(--gold-faint)}
.nav-icon{font-size:.9rem;width:18px;text-align:center}
.sb-foot{padding:.9rem 1.4rem;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px}
.user-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dim),var(--gold));display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:500;color:var(--deep);flex-shrink:0}
.user-name{font-size:.7rem;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
.logout{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.8rem;transition:color .2s}
.logout:hover{color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.4rem;gap:1rem}
.menu-btn{display:none;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:4px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:400}
.topbar-right{margin-left:auto}
.date-chip{font-size:.7rem;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:5px 11px;border-radius:2px}
.content{flex:1;overflow-y:auto;padding:1.4rem}
.section-label{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:.75rem;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.form-layout{display:grid;grid-template-columns:1fr 360px;gap:1rem;align-items:start}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:1.2rem}
.pcard-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:400;color:var(--text);margin-bottom:1.1rem}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:.9rem}
.field:last-child{margin-bottom:0}
.field label{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim)}
.field input,.field select{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:2px;padding:.7rem .9rem;font-family:'Outfit',sans-serif;font-size:.85rem;color:var(--text);outline:none;transition:border-color .25s,background .25s}
.field input:focus,.field select:focus{border-color:var(--gold-dim);background:rgba(201,168,76,.04)}
.field input::placeholder{color:var(--dim)}
.field select option{background:var(--card);color:var(--text)}
.field select:disabled{opacity:.4;cursor:not-allowed}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem}

/* Jenis pills */
.jenis-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.jenis-pill{
  padding:.7rem .9rem;border:1px solid var(--border);border-radius:2px;
  cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02);
  font-family:'Outfit',sans-serif;text-align:left;
}
.jenis-pill:hover{border-color:var(--border-md);background:var(--gold-faint)}
.jenis-pill.selected{border-color:var(--gold);background:rgba(201,168,76,.1)}
.jp-name{font-size:.8rem;color:var(--text);display:block;margin-bottom:3px}
.jp-poin{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--amber)}
.jp-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}

/* Sanksi pills */
.sanksi-group{display:flex;gap:8px}
.sanksi-pill{flex:1;padding:.7rem;border:1px solid var(--border);border-radius:2px;font-family:'Outfit',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;background:none;text-align:center}
.sanksi-pill:hover{border-color:var(--border-md);color:var(--text)}
.sanksi-pill.sel-tegur{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.sanksi-pill.sel-panggil{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* Submit */
.submit-btn{width:100%;margin-top:1.2rem;padding:.85rem;background:none;border:1px solid var(--gold-dim);border-radius:2px;font-family:'Outfit',sans-serif;font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold-light);cursor:pointer;position:relative;overflow:hidden;transition:border-color .3s}
.submit-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));opacity:0;transition:opacity .3s}
.submit-btn:hover{border-color:var(--gold)}.submit-btn:hover::before{opacity:1}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.submit-btn span{position:relative;z-index:1}
.status-bar{border-radius:2px;padding:8px 12px;font-size:.75rem;margin-top:.7rem;display:none}
.status-bar.err{background:var(--red-bg);color:var(--red);display:block}

/* Preview */
.preview-card{background:var(--card2);border:1px solid var(--border);border-radius:2px;padding:1.1rem;margin-bottom:1rem}
.preview-title{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:.9rem}
.preview-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(201,168,76,.06)}
.preview-row:last-child{border-bottom:none}
.pr-key{font-size:.72rem;color:var(--muted)}
.pr-val{font-size:.78rem;color:var(--text);text-align:right;max-width:180px;word-break:break-word}
.pr-val.empty{color:var(--dim);font-style:italic}
.pr-val.poin{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--amber)}

/* Log */
.log-empty{text-align:center;color:var(--dim);font-size:.78rem;padding:2rem 0}
.log-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid rgba(201,168,76,.06)}
.log-item:last-child{border-bottom:none}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.log-dot-ok{background:var(--green)}.log-dot-err{background:var(--red)}
.log-body{flex:1;min-width:0}
.log-name{font-size:.8rem;color:var(--text)}
.log-meta{font-size:.68rem;color:var(--muted);margin-top:1px}
.log-poin{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--amber);flex-shrink:0}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--card);border:1px solid var(--border-md);border-radius:2px;padding:.9rem 1.2rem;display:flex;align-items:center;gap:10px;font-size:.8rem;min-width:260px;transform:translateY(20px);opacity:0;transition:all .35s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1;pointer-events:auto}

@media(max-width:900px){.form-layout{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.menu-btn{display:block}.field-row{grid-template-columns:1fr}.jenis-grid{grid-template-columns:1fr}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:15;backdrop-filter:blur(2px)}
.fade{opacity:0;transform:translateY(10px);animation:fu .5s forwards}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSb()"></div>
<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sb-logo"><div class="logo-mark">MSBS</div><div class="logo-sub">Sistem Pelanggaran Bahasa</div></div>
  <nav class="nav">
    <div class="nav-sec">Utama</div>
    <div class="nav-item" onclick="window.location.href='dashboard.html'"><span class="nav-icon">◈</span>Dashboard</div>
    <div class="nav-item active"><span class="nav-icon">✦</span>Input Pelanggaran</div>
    <div class="nav-sec">Sistem</div>
    <div class="nav-item" onclick="doLogout()"><span class="nav-icon">↩</span>Keluar</div>
  </nav>
  <div class="sb-foot">
    <div class="user-row">
      <div class="user-av">QL</div>
      <span class="user-name">qismullughohmsbs</span>
      <button class="logout" onclick="doLogout()">↩</button>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSb()">☰</button>
    <div class="page-title">Input Pelanggaran Santri</div>
    <div class="topbar-right"><div class="date-chip" id="dateChip"></div></div>
  </div>
  <div class="content">
    <div class="form-layout">
      <!-- FORM -->
      <div>
        <div class="section-label fade d1">Data Pelanggaran</div>
        <div class="pcard fade d1">
          <div class="pcard-title">Form Input Pelanggaran Bahasa</div>

          <!-- Tanggal & Waktu -->
          <div class="field-row">
            <div class="field" style="margin-bottom:0">
              <label>Tanggal</label>
              <input type="date" id="inpTgl" onchange="updatePreview()"/>
            </div>
            <div class="field" style="margin-bottom:0">
              <label>Waktu</label>
              <input type="time" id="inpWaktu" onchange="updatePreview()"/>
            </div>
          </div>

          <!-- Kelas -->
          <div class="field" style="margin-top:.9rem">
            <label>Kelas</label>
            <select id="selKelas" onchange="onKelasChange()">
              <option value="">— Pilih Kelas —</option>
              <option value="Kelas 1">Kelas 1</option>
              <option value="Kelas 2">Kelas 2</option>
              <option value="Kelas 3">Kelas 3</option>
            </select>
          </div>

          <!-- Nama Santri -->
          <div class="field">
            <label>Nama Santri</label>
            <select id="selSantri" disabled onchange="updatePreview()">
              <option value="">— Pilih kelas dulu —</option>
            </select>
          </div>

          <!-- Jenis Pelanggaran -->
          <div class="field">
            <label>Jenis Pelanggaran</label>
            <div class="jenis-grid" id="jenisGrid">
              <button class="jenis-pill" onclick="setJenis('Bahasa Kasar',1,this)">
                <span class="jp-name"><span class="jp-dot" style="background:#E07070"></span>Bahasa Kasar</span>
                <span class="jp-poin">1 poin</span>
              </button>
              <button class="jenis-pill" onclick="setJenis('Bahasa Kotor',2,this)">
                <span class="jp-name"><span class="jp-dot" style="background:#E8A84C"></span>Bahasa Kotor</span>
                <span class="jp-poin">2 poin</span>
              </button>
              <button class="jenis-pill" onclick="setJenis('Tidak Bawa Kertas/Buku',2,this)">
                <span class="jp-name"><span class="jp-dot" style="background:#C9A84C"></span>Tidak Bawa Kertas/Buku</span>
                <span class="jp-poin">2 poin</span>
              </button>
              <button class="jenis-pill" onclick="setJenis('Bahasa Daerah',3,this)">
                <span class="jp-name"><span class="jp-dot" style="background:#5E9CE8"></span>Bahasa Daerah</span>
                <span class="jp-poin">3 poin</span>
              </button>
            </div>
          </div>

          <!-- Sanksi -->
          <div class="field">
            <label>Sanksi</label>
            <div class="sanksi-group">
              <button class="sanksi-pill" id="sp-tegur" onclick="setSanksi('Ditegur',this,'tegur')">Ditegur</button>
              <button class="sanksi-pill" id="sp-panggil" onclick="setSanksi('Dipanggil QA Bahasa',this,'panggil')">Dipanggil QA Bahasa</button>
            </div>
          </div>

          <div class="status-bar" id="statusBar"></div>
          <button class="submit-btn" id="submitBtn" onclick="submitData()">
            <span>Simpan & Kirim ke Spreadsheet</span>
          </button>
        </div>
      </div>

      <!-- KANAN -->
      <div>
        <div class="section-label fade d2">Pratinjau & Riwayat</div>
        <div class="preview-card fade d2">
          <div class="preview-title">Pratinjau Data</div>
          <div class="preview-row"><span class="pr-key">Tanggal</span><span class="pr-val empty" id="pv-tgl">—</span></div>
          <div class="preview-row"><span class="pr-key">Kelas</span><span class="pr-val empty" id="pv-kelas">—</span></div>
          <div class="preview-row"><span class="pr-key">Nama Santri</span><span class="pr-val empty" id="pv-nama">—</span></div>
          <div class="preview-row"><span class="pr-key">Jenis</span><span class="pr-val empty" id="pv-jenis">—</span></div>
          <div class="preview-row"><span class="pr-key">Poin</span><span class="pr-val poin empty" id="pv-poin">—</span></div>
          <div class="preview-row"><span class="pr-key">Sanksi</span><span class="pr-val empty" id="pv-sanksi">—</span></div>
        </div>
        <div class="pcard fade d3">
          <div class="pcard-title">Riwayat Sesi Ini</div>
          <div id="logArea"><div class="log-empty">Belum ada data dikirim</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwiTtFYXXLfMNOrNF6SyHSGOSujqJjTofwrTuemnJoFgbS7jXt9eup8f9Y8G7QpJYes/exec';

let selJenis='', selPoin=0, selSanksi='', logData=[];
const santriCache={}, fetchedKelas={};

// Init
const now=new Date();
document.getElementById('dateChip').textContent=now.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
document.getElementById('inpTgl').value=now.toISOString().split('T')[0];
document.getElementById('inpWaktu').value=now.toTimeString().slice(0,5);

// Kelas → Santri
async function onKelasChange(){
  const kelas=document.getElementById('selKelas').value;
  const sel=document.getElementById('selSantri');
  selJenis='';selPoin=0;
  document.querySelectorAll('.jenis-pill').forEach(p=>p.classList.remove('selected'));
  sel.innerHTML='<option value="">— Memuat... —</option>';
  sel.disabled=true;
  updatePreview();
  if(!kelas){sel.innerHTML='<option value="">— Pilih kelas dulu —</option>';return;}
  if(fetchedKelas[kelas]){populateSantri(kelas);return;}
  try{
    const res=await fetch(SCRIPT_URL+'?action=getSantri&kelas='+encodeURIComponent(kelas));
    const json=await res.json();
    if(json.status==='ok'&&Array.isArray(json.data)){
      santriCache[kelas]=json.data;
      fetchedKelas[kelas]=true;
      populateSantri(kelas);
      return;
    }
  }catch(e){}
  santriCache[kelas]=[];fetchedKelas[kelas]=true;
  populateSantri(kelas,true);
}

function populateSantri(kelas,noData=false){
  const sel=document.getElementById('selSantri');
  const list=santriCache[kelas]||[];
  if(list.length===0){
    sel.innerHTML='<option value="">— Belum ada santri —</option>';
    if(noData)showToast('⚠','Isi daftar santri di Sheet "DataSantri" terlebih dahulu');
  }else{
    sel.innerHTML='<option value="">— Pilih santri —</option>';
    list.forEach(nama=>{const o=document.createElement('option');o.value=nama;o.textContent=nama;sel.appendChild(o);});
  }
  sel.disabled=false;
  updatePreview();
}

function setJenis(nama,poin,btn){
  selJenis=nama;selPoin=poin;
  document.querySelectorAll('.jenis-pill').forEach(p=>p.classList.remove('selected'));
  btn.classList.add('selected');
  updatePreview();
}

function setSanksi(val,btn,key){
  selSanksi=val;
  document.querySelectorAll('.sanksi-pill').forEach(p=>{p.className='sanksi-pill';});
  btn.classList.add('sel-'+key);
  updatePreview();
}

function updatePreview(){
  const kelas=document.getElementById('selKelas').value;
  const nama=document.getElementById('selSantri').value;
  const tgl=document.getElementById('inpTgl').value;
  const waktu=document.getElementById('inpWaktu').value;
  pv('pv-tgl', tgl?formatTgl(tgl)+' '+waktu:'—', !tgl);
  pv('pv-kelas', kelas||'—', !kelas);
  pv('pv-nama', nama||'—', !nama);
  pv('pv-jenis', selJenis||'—', !selJenis);
  const pe=document.getElementById('pv-poin');
  pe.textContent=selPoin?selPoin+' poin':'—';
  pe.className='pr-val poin'+(selPoin?'':' empty');
  pv('pv-sanksi', selSanksi||'—', !selSanksi);
}
function pv(id,val,empty){const el=document.getElementById(id);el.textContent=val;el.className='pr-val'+(empty?' empty':'');}
function formatTgl(s){const d=new Date(s);return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});}

async function submitData(){
  const kelas=document.getElementById('selKelas').value;
  const nama=document.getElementById('selSantri').value;
  const tgl=document.getElementById('inpTgl').value;
  const waktu=document.getElementById('inpWaktu').value;
  const sb=document.getElementById('statusBar');
  sb.style.display='none';

  if(!tgl){showErr('Isi tanggal pelanggaran.');return;}
  if(!kelas){showErr('Pilih kelas terlebih dahulu.');return;}
  if(!nama){showErr('Pilih nama santri.');return;}
  if(!selJenis){showErr('Pilih jenis pelanggaran.');return;}
  if(!selSanksi){showErr('Pilih sanksi.');return;}

  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.querySelector('span').textContent='Mengirim...';

  const payload={
    action:'addPelanggaran',
    tanggal:tgl,waktu,nama,kelas,
    jenis:selJenis,poin:selPoin,sanksi:selSanksi,
    timestamp:new Date().toISOString()
  };

  let ok=false;
  try{
    await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'});
    ok=true;
  }catch(e){ok=false;}

  if(ok){
    addLog(nama,kelas,selJenis,selPoin,true);
    showToast('✓','Data berhasil dikirim ke Spreadsheet!');
    resetForm();
  }else{
    addLog(nama,kelas,selJenis,selPoin,false);
    showToast('✗','Gagal kirim. Periksa koneksi internet.');
    showErr('Gagal mengirim. Coba lagi.');
  }
  btn.disabled=false;btn.querySelector('span').textContent='Simpan & Kirim ke Spreadsheet';
}

function showErr(msg){const sb=document.getElementById('statusBar');sb.textContent=msg;sb.className='status-bar err';}

function resetForm(){
  document.getElementById('selSantri').value='';
  selJenis='';selPoin=0;selSanksi='';
  document.querySelectorAll('.jenis-pill').forEach(p=>p.classList.remove('selected'));
  document.querySelectorAll('.sanksi-pill').forEach(p=>p.className='sanksi-pill');
  const n=new Date();
  document.getElementById('inpTgl').value=n.toISOString().split('T')[0];
  document.getElementById('inpWaktu').value=n.toTimeString().slice(0,5);
  updatePreview();
}

function addLog(nama,kelas,jenis,poin,ok){
  logData.unshift({nama,kelas,jenis,poin,ok,waktu:new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})});
  const area=document.getElementById('logArea');
  area.innerHTML=logData.slice(0,8).map(l=>`
    <div class="log-item">
      <div class="log-dot ${l.ok?'log-dot-ok':'log-dot-err'}"></div>
      <div class="log-body">
        <div class="log-name">${l.nama} <span style="color:var(--dim);font-size:.68rem">(${l.kelas})</span></div>
        <div class="log-meta">${l.jenis} · ${l.waktu} · ${l.ok?'<span style="color:var(--green)">Terkirim</span>':'<span style="color:var(--red)">Gagal</span>'}</div>
      </div>
      <div class="log-poin">${l.poin}</div>
    </div>`).join('');
}

function showToast(icon,msg){
  const t=document.getElementById('toast');
  document.getElementById('toastIcon').textContent=icon;
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

function doLogout(){if(confirm('Keluar dari sistem?')){sessionStorage.removeItem('msbs_auth');window.location.href='login.html';}}
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').style.display='block';}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').style.display='none';}
</script>
</body>
